<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">

<head>
  <!-- Charset & Viewport -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ Primary SEO — keywords at start, under 60 chars, action-oriented -->
  <title>Krystal — Corporate Gifting Platform Pakistan | Luxury Gifts</title>

  <!-- ✅ 150-160 chars, natural keywords, no stuffing, compelling copy -->
  <meta name="description"
    content="Pakistan's premier corporate gifting platform. AI-powered gift matching, bulk orders, custom branding. Premium gifts for clients & employees." />

  <meta name="author" content="Krystal" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <link rel="canonical" href="https://krystalgifting.vercel.app/" />

  <!-- ✅ Meta keywords removed — Google ignores since 2009, no SEO value -->

  <!-- Open Graph — WhatsApp/LinkedIn/Facebook share preview -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Krystal" />
  <meta property="og:url" content="https://krystalgifting.vercel.app/" />
  <meta property="og:title" content="Krystal — Corporate Gifting Platform Pakistan" />
  <meta property="og:description"
    content="AI-powered gift matching trusted by 100+ companies. Custom branded gifts, bulk orders, same-day delivery in Karachi. Clients, employees, events — we handle it all." />
  <meta property="og:image" content="https://krystalgifting.vercel.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="628" />
  <meta property="og:image:alt" content="Krystal — Luxury Corporate Gifting Pakistan" />
  <meta property="og:locale" content="en_PK" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@krystalpk" />
  <meta name="twitter:title" content="Krystal — Corporate Gifting Platform Pakistan" />
  <meta name="twitter:description"
    content="AI-powered gifting trusted by 100+ companies. Bulk orders, custom branding, same-day Karachi delivery. Premium gifts for clients and employees." />
  <meta name="twitter:image" content="https://krystalgifting.vercel.app/og-image.png" />
  <meta name="twitter:image:alt" content="Krystal — Luxury Corporate Gifting Pakistan" />

  <!-- Mobile / Browser Theme -->
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="color-scheme" content="dark" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Krystal" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Preconnect for fonts — reduces load time -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- JSON-LD Structured Data — boosts Google rich results -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Krystal",
    "url": "https://krystal.pk",
    "logo": "https://krystal.pk/logo.png",
    "description": "AI-powered luxury corporate gifting platform. Custom branded gifts, bulk orders, and same-day delivery across Pakistan.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Karachi",
      "addressCountry": "PK"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+92-328-2200919",
      "contactType": "customer service",
      "availableLanguage": ["English", "Urdu"]
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "4.8",
      "reviewCount": "156",
      "bestRating": "5"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Krystal",
    "url": "https://krystal.pk",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://krystal.pk/shop?search={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
